root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/tifo ."
bin = "./tmp/tifo"
delay = 200
exclude_dir = ["tmp", ".git", ".idea", ".vscode"]
include_ext = ["go"]
stop_on_error = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[screen]
clear_on_rebuild = true